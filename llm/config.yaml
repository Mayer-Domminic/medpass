# LLM Service Configuration

# Provider configuration - 'ollama' or 'gemini'
provider: ollama 

# Ollama settings
ollama:
  base_url: http://ollama:11434
  model: medpass-llm
  context_window: 16384
  batch_size: 16
  temperature: 0.7
  top_p: 0.9

# Gemini settings
gemini:
  api_key: ""  # gemini API key here, likely found in llm/.env?
  model: "gemini-1.5-pro"  # need to config to specific
  max_tokens: 8192
  temperature: 0.7
  top_p: 0.9

# System prompt template
system_prompt_template: templates/default.txt