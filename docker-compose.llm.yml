services:
  ollama:
    container_name: medpass-llm
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./llm:/llm
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Windows+WSL2 GPU configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data: